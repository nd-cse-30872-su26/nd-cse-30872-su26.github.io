title:      "Reading 05: Trees"
body:       |

    **Everyone**:

    Next week, we will work on problems related to [trees] and in particular
    [binary trees], [heaps], and [binary search trees].  Understanding how to
    represent, manipulate, and operating on these data structures will be
    necessary to solve [Challenge 13], [Challenge 14], and [Challenge 15].

    [Challenge 13]: challenge13.html
    [Challenge 14]: challenge14.html
    [Challenge 15]: challenge15.html

    [trees]: https://en.wikipedia.org/wiki/Binary_tree
    [binary trees]: https://en.wikipedia.org/wiki/Binary_tree
    [heaps]: https://en.wikipedia.org/wiki/Heap_(data_structure)
    [binary search trees]: https://en.wikipedia.org/wiki/Binary_search_tree

    ## Reading

    The readings for this week are:

    1.  <div class="flex-col" markdown="1">

        [Competitive Programmer's Handbook]

        - Chapter 14 - Tree Algorithms
        - Chapter 18 - Tree Queries

    2.  <div class="flex-col" markdown="1">

        [Data Structures Handbook](https://www.thedshandbook.com/)

        - [Trees](https://www.thedshandbook.com/trees/)
        - [Tree Traverals](https://www.thedshandbook.com/tree-traversals/)
        - [Binary Trees](https://www.thedshandbook.com/binary-trees/)
        - [Binary Search Trees](https://www.thedshandbook.com/binary-search-trees/)

    [C++]:      https://isocpp.org/
    [Python]:   https://www.python.org/

