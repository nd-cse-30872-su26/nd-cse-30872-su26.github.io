title:      "Reading 02: Searching, Sorting, and Associative Containers"
body:       |

    **Everyone**:

    Next week, we will work on problems related to [searching], [sorting], and
    [associative containers] such as [sets], [maps], and [hash tables].
    Knowing how to apply these techniques will come in handy for [Challenge
    04], [Challenge 05], and [Challenge 06].

    [Challenge 04]: challenge04.html
    [Challenge 05]: challenge05.html
    [Challenge 06]: challenge06.html

    [searching]: https://en.wikipedia.org/wiki/Search_algorithm
    [sorting]: https://en.wikipedia.org/wiki/Sorting_algorithm

    [associative containers]: https://en.wikipedia.org/wiki/Associative_containers
    [sets]: https://en.wikipedia.org/wiki/Set_(abstract_data_type)
    [maps]: https://en.wikipedia.org/wiki/Associative_array
    [hash tables]: https://en.wikipedia.org/wiki/Hash_table
    [C++]: https://isocpp.org/
    [Python]: https://www.python.org/

    ## Reading

    <div class="flex-row" markdown="1">

    <div class="flex-col" markdown="1">

    The readings for this week are:

    1.  <div class="flex-col" markdown="1">

        [Competitive Programmer's Handbook]

        - Chapter 3 Sorting

        - <div class="flex-col" markdown="1">

            Chapter 4 Data Structures

            *Focus on sections 4.2 Set structures and 4.3 Map structures.*

    </div>

    <div class="flex-col" markdown="1">

