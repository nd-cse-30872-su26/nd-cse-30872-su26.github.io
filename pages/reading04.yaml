title:      "Reading 04: Dynamic Programming"
body:       |

    **Everyone**:

    Next week, we will work on problems related to the following problem
    solving technique:

    > [Dynamic Programming]: This is a problem solving technique that can be
    viewed as a combination of [complete search] (*correctness*) and [greedy
    algorithms] (*efficiency*).

    This technique will come in handy for solving [Challenge 10], [Challenge
    11], and [Challenge 12].

    ## Reading

    <div class="flex-row" markdown="1">

    <div class="flex-col" markdown="1">

    The readings for this week are:

    1.  <div class="flex-col" markdown="1">

        [Competitive Programmer's Handbook]

        - Chapter 7 Dynamic Programming

    2. [A graphical introduction to dynamic programming](https://medium.com/future-vision/a-graphical-introduction-to-dynamic-programming-2e981fa7ca2?sk=37cd14642cf1a83eb0bb33d231442837)

    </div>

    <div class="flex-col" markdown="1">

    ### Optional

    - [Dynamic Programming for Brute-Forcers](https://hackernoon.com/dynamic-programming-for-brute-forcers-36f26c2466cf)

    - [Demystifying Dynamic Programming](https://medium.freecodecamp.org/demystifying-dynamic-programming-3efafb8d4296)

    </div>

    </div>

