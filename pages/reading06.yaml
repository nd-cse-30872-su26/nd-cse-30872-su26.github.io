title:      "Reading 06: Graphs (Representation, Traversals, Shortest Paths, MSTs)"
body:       |

    **Everyone**:

    Next week, we will work on problems related to [graphs] and will focus on
    representing them, traversing them, computing the shortest path in a graph,
    and forming a minimum spanning tree.  Understanding these concepts will be
    necessary to solve [Challenge 16], [Challenge 17], and [Challenge 18].

    [Challenge 16]: challenge16.html
    [Challenge 17]: challenge17.html
    [Challenge 18]: challenge18.html
    [graphs]:       https://en.wikipedia.org/wiki/Graph_(abstract_data_type)

    ## Reading

    The readings for this week are:

    1.  <div class="flex-col" markdown="1">

        [Competitive Programmer's Handbook]

        - Chapter 11 - Basics of graphs
        - Chapter 12 - Graph traversal
        - Chapter 13 - Shortest paths
        - Chapter 15 - Spanning Trees

    [C++]:      https://isocpp.org/
    [Python]:   https://www.python.org/

